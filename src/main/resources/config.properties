# =============================================================================
# Cora Automation Framework - Global Configuration & Test Data
# Naming convention: cora.<page>.<context>.<field>[.<index>]
# =============================================================================

# --- Environment ---
base.url=https://app.cora.betaplanets.com
cora.login.path=/login
browser=chrome
implicit.wait.seconds=0
explicit.wait.seconds=15
page.load.timeout.seconds=60
navigation.retry.count=2

# --- Chrome (exclusive browser) ---
# Set true for headless parallel runs (~20-30% faster, lower RAM)
chrome.headless=false

# --- Reporting ---
report.product.name=Cora PWA
report.name=Cora PWA — Extend Module Wise QA Report
report.title=Cora PWA — Extend Module Wise QA Report
screenshot.on.pass=true
screenshot.on.fail=true

# --- Reporting: Web/PWA execution environment (displayed in HTML/PDF dashboard) ---
report.env.automation.engine=Selenium WebDriver
report.env.platform.name=Web (PWA)
report.env.device.name=Google Chrome
report.env.os.version=Desktop
report.env.app.version=Latest
report.env.app.package=Cora PWA

# --- Login Page - Positive Test Data ---
cora.login.valid.username=carl@knoxweb.us
cora.login.valid.password=Carl@knoxweb.us
cora.login.expected.success.path=/home

# --- Login Page - Negative Test Data (4 parallel DataProvider rows) ---
# assertion.type: ERROR_MESSAGE | SIGN_IN_DISABLED
cora.login.negative.scenario.1=INVALID_CREDENTIALS
cora.login.negative.username.1=wrong@email.com
cora.login.negative.password.1=wrongpass
cora.login.negative.assertion.type.1=ERROR_MESSAGE
cora.login.negative.expected.1=The provided credentials are incorrect.

cora.login.negative.scenario.2=BLANK_EMAIL
cora.login.negative.username.2=
cora.login.negative.password.2=Carl@knoxweb.us
cora.login.negative.assertion.type.2=SIGN_IN_DISABLED
cora.login.negative.expected.2=

cora.login.negative.scenario.3=BLANK_PASSWORD
cora.login.negative.username.3=carl@knoxweb.us
cora.login.negative.password.3=
cora.login.negative.assertion.type.3=SIGN_IN_DISABLED
cora.login.negative.expected.3=

cora.login.negative.scenario.4=BOTH_FIELDS_BLANK
cora.login.negative.username.4=
cora.login.negative.password.4=
cora.login.negative.assertion.type.4=SIGN_IN_DISABLED
cora.login.negative.expected.4=

