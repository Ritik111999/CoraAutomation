# =============================================================================
# Cora Automation Framework - Global Configuration & Test Data
# Naming convention: cora.<page>.<context>.<field>[.<index>]
# =============================================================================

# --- Environment ---
base.url=https://www.cora-website.com
browser=chrome
implicit.wait.seconds=0
explicit.wait.seconds=15
page.load.timeout.seconds=30

# --- Reporting ---
report.name=Cora Automation Report
report.title=Cora Test Execution Report
screenshot.on.pass=true
screenshot.on.fail=true

# --- Login Page - Positive Test Data ---
cora.login.valid.username=admin_user
cora.login.valid.password=${CORA_PASSWORD}

# --- Login Page - Negative Test Data (indexed sets for DataProviders) ---
cora.login.invalid.username.1=wrong_user
cora.login.invalid.password.1=wrong_pass
cora.login.expected.error.1=Invalid credentials provided.

cora.login.invalid.username.2=
cora.login.invalid.password.2=SuperSecret123
cora.login.expected.error.2=Username is required.

cora.login.invalid.username.3=admin_user
cora.login.invalid.password.3=
cora.login.expected.error.3=Password is required.
