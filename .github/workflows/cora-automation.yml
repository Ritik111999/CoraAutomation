name: Cora Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cora-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Selenium TestNG (Chrome headless)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Run full automation suite (CI profile)
        env:
          CORA_BASE_URL: ${{ secrets.CORA_BASE_URL }}
          CORA_USERNAME: ${{ secrets.CORA_USERNAME }}
          CORA_PASSWORD: ${{ secrets.CORA_PASSWORD }}
        run: |
          MVN_ARGS="-B test -Pci"
          if [ -n "$CORA_USERNAME" ]; then
            MVN_ARGS="$MVN_ARGS -Dcora.login.valid.username=$CORA_USERNAME"
          fi
          if [ -n "$CORA_PASSWORD" ]; then
            MVN_ARGS="$MVN_ARGS -Dcora.login.valid.password=$CORA_PASSWORD"
          fi
          if [ -n "$CORA_BASE_URL" ]; then
            MVN_ARGS="$MVN_ARGS -Dbase.url=$CORA_BASE_URL"
          fi
          mvn $MVN_ARGS

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cora-reports-${{ github.run_number }}
          path: |
            test-output/reports/
            test-output/screenshots/
          retention-days: 14

      - name: Upload Surefire results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7
